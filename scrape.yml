name: Scheduled Coffee Scraper

on:
  push:
    branches:
      - main
    paths:
      - 'scrape.py'
      - 'requirements.txt'
      - '.github/workflows/scrape.yml'
  schedule:
    # Runs every 4 hours (At minute 0 of every 4th hour)
    # This corresponds to KST (Korean Standard Time): 01:00, 05:00, 09:00, 13:00, 17:00, 21:00
    - cron: '0 */4 * * *'
  workflow_dispatch: # Allows you to manually trigger the scraping in the GitHub interface anytime!

permissions:
  contents: write # Grants GitHub Actions write permissions to commit updated products.json back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Upgraded to v4 to remove Node.js deprecation warnings

      - name: Set up Python
        uses: actions/setup-python@v5 # Upgraded to v5 to remove Node.js deprecation warnings
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Coffee Scraper
        env:
          # Securely injects your scraper API keys from repository secrets
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          SCRAPER_API_PREMIUM: ${{ secrets.SCRAPER_API_PREMIUM }}
          SCRAPE_DO_TOKEN: ${{ secrets.SCRAPE_DO_TOKEN }}
          SCRAPINGANT_API_KEY: ${{ secrets.SCRAPINGANT_API_KEY }}
        run: python scrape.py

      - name: Commit and Push Updated products.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add products.json
          git diff-index --quiet HEAD || git commit -m "chore: Auto-update products.json [skip ci]"
          # Pull latest commits, resolving any conflicts on generated files by preferring the runner's newly scraped files!
          git pull --rebase -X theirs origin main
          git push origin main
