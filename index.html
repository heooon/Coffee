<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Sale</title>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.2.2">
</head>
<body>
    <main class="container">
        <!-- Controls & Filters (Highly Optimized Mobile Grid Layout) -->
        <section class="controls-panel">
            <!-- Tier 1: Live Status, Refresh, and In-Stock Toggle -->
            <div class="controls-tier tier-primary">
                <div class="refresh-panel">
                    <span class="live-dot"></span>
                    <span id="last-updated">Checking for updates...</span>
                </div>
                
                <div class="controls-actions">
                    <div class="toggle-group">
                        <label class="switch-container">
                            <input type="checkbox" id="instock-only-toggle">
                            <span class="switch-slider"></span>
                        </label>
                        <span class="toggle-text">품절 제외</span>
                    </div>
                    
                    <div class="theme-menu-container">
                        <button id="theme-menu-btn" class="theme-menu-btn" title="디자인 테마 변경">
                            <i class="fa-solid fa-palette"></i>
                        </button>
                        <div id="theme-popup" class="theme-popup hidden">
                            <div class="theme-popup-header">Theme</div>
                            <button class="theme-select-btn active" data-theme="warm">☕ 에스프레소 다크</button>
                            <button class="theme-select-btn" data-theme="editorial">📖 에디토리얼 페이퍼</button>
                            <button class="theme-select-btn" data-theme="swiss">🇨🇭 스위스 미니멀</button>
                            <button class="theme-select-btn" data-theme="cyber">⚡ 사이버 네온</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Tier 2: Roastery Filters -->
            <div class="controls-tier tier-roastery">
                <div class="filter-group">
                    <span class="filter-label">Roastery</span>
                    <div class="tabs">
                        <button class="tab-btn active" data-store="all">전체</button>
                        <button class="tab-btn" data-store="502">502</button>
                        <button class="tab-btn" data-store="존스몰">존스몰</button>
                        <button class="tab-btn" data-store="딥다이브">딥다이브</button>
                        <button class="tab-btn" data-store="신양">신양</button>
                        <button class="tab-btn" data-store="아이덴티티">아이덴티티</button>
                        <button class="tab-btn" data-store="먼스커피">먼스커피</button>
                    </div>
                </div>
            </div>

            <!-- Tier 3: View Modes & Sorting (Line Break / Dedicated New Row) -->
            <div class="controls-tier tier-views">
                <div class="view-group">
                    <span class="filter-label">Layout</span>
                    <div class="view-tabs">
                        <button class="view-btn active" data-view="list">📰 List</button>
                        <button class="view-btn" data-view="grid">🖼️ Card</button>
                        <button class="view-btn" data-view="text">📝 Text</button>
                    </div>
                </div>

                <div class="sort-group">
                    <span class="filter-label">Sort By</span>
                    <div class="sort-tabs">
                        <button class="sort-btn active" data-sort="store">Store ▲</button>
                        <button class="sort-btn" data-sort="price">Price</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Stats Overview (Sleek Space-saving Panel) -->
        <section class="stats-panel">
            <div class="stat-card total-items">
                <div class="stat-num" id="stat-total">0</div>
                <div class="stat-label">전체 상품 수</div>
            </div>
            <div class="stat-card sale-items">
                <div class="stat-num" id="stat-sales">0</div>
                <div class="stat-label">판매 중</div>
            </div>
            <div class="stat-card sold-out-items">
                <div class="stat-num" id="stat-soldout">0</div>
                <div class="stat-label">품절 상품</div>
            </div>
        </section>

        <!-- Product Grid -->
        <section class="products-section">
            <div id="loading-spinner" class="loading-container">
                <div class="spinner"></div>
                <p>원두 정보를 가져오고 있습니다. 잠시만 기다려주세요...</p>
            </div>
            
            <div id="error-message" class="error-container hidden">
                <p class="error-text">❌ 상품 정보를 가져오지 못했습니다. 잠시 후 다시 시도해 주세요.</p>
                <p id="error-details" class="error-subtext"></p>
            </div>

            <div id="products-grid" class="products-grid hidden">
                <!-- Dynamically populated via script.js -->
            </div>
            
            <div id="no-products" class="no-products hidden">
                <p>🔍 조건에 부합하는 원두 상품이 없습니다.</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Coffee Stock Board.</p>
    </footer>

    <script src="script.js?v=1.2.2"></script>
</body>
</html>
